<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xStream — Your Gateway to Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#080808', surface: '#111113', card: '#1A1A1E',
                        accent: '#E63946', teal: '#00D4AA', gold: '#F5C518',
                        muted: '#7A7A7A', border: '#2A2A2E',
                    },
                    fontFamily: {
                        display: ['"Bebas Neue"', 'sans-serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        *,*::before,*::after{box-sizing:border-box}
        body{background:#080808;overflow-x:hidden}
        .scrollbar-hide::-webkit-scrollbar{display:none}
        .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
        .skeleton{background:linear-gradient(90deg,#1A1A1E 25%,#252528 50%,#1A1A1E 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        @keyframes heroZoom{from{transform:scale(1)}to{transform:scale(1.1)}}
        .hero-zoom{animation:heroZoom 25s ease-out forwards}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
        .anim-fiu{opacity:0;animation:fadeInUp .6s ease-out forwards}
        .anim-fiu-d1{animation-delay:.1s}.anim-fiu-d2{animation-delay:.2s}.anim-fiu-d3{animation-delay:.3s}.anim-fiu-d4{animation-delay:.4s}
        @keyframes modalIn{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}
        .anim-modal{animation:modalIn .35s ease-out forwards}
        @keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
        @keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}
        .toast-in{animation:toastIn .3s ease-out forwards}
        .toast-out{animation:toastOut .3s ease-in forwards}
        @keyframes pulseGlow{0%,100%{box-shadow:0 0 20px rgba(230,57,70,.3)}50%{box-shadow:0 0 40px rgba(230,57,70,.5)}}
        .pulse-glow{animation:pulseGlow 2.5s ease-in-out infinite}
        @keyframes floatOrb{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(.95)}}
        .float-orb{animation:floatOrb 12s ease-in-out infinite}
        .float-orb-slow{animation:floatOrb 18s ease-in-out infinite reverse}
        .header-scrolled{background:rgba(8,8,8,.85)!important;backdrop-filter:blur(20px)!important;border-bottom:1px solid rgba(42,42,46,.5)!important}
        .movie-card:hover .card-glow{opacity:1}
        .card-glow{opacity:0;transition:opacity .4s ease;position:absolute;inset:-2px;border-radius:14px;background:linear-gradient(135deg,rgba(230,57,70,.4),transparent 60%);z-index:-1;filter:blur(8px)}
        .row-btn{transition:all .2s}
        .row-btn:hover{background:#E63946;border-color:#E63946;color:#fff}
        .genre-tag{background:rgba(230,57,70,.15);border:1px solid rgba(230,57,70,.3);color:#E63946;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap;transition:all .2s}
        .genre-tag:hover{background:rgba(230,57,70,.3)}
        .star-filled{color:#F5C518}.star-empty{color:#3A3A3E}
        *:focus-visible{outline:2px solid #E63946;outline-offset:2px}
        @media(max-width:768px){.hero-title{font-size:3rem!important}.search-desktop{display:none}}
        @media(min-width:769px){.search-mobile{display:none}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
        .cast-card:hover .cast-photo{transform:scale(1.08);border-color:#E63946}
        .cast-photo{transition:all .3s ease;border:2px solid transparent}
        .video-tab{transition:all .2s;border-bottom:2px solid transparent}
        .video-tab.active{color:#E63946;border-bottom-color:#E63946}
        @keyframes spin{to{transform:rotate(360deg)}}
        .spin{animation:spin 1s linear infinite}
        .proxy-badge{font-size:10px;background:rgba(245,197,24,.15);border:1px solid rgba(245,197,24,.3);color:#F5C518;padding:2px 8px;border-radius:10px}
        .source-pill{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:12px;font-size:13px;font-weight:600;transition:transform .15s;cursor:pointer;text-decoration:none}
        .source-pill:hover{transform:scale(1.05)}
        .wtw-loading{display:flex;align-items:center;gap:8px;color:#7A7A7A;font-size:13px;padding:12px 0}
    </style>
</head>
<body class="bg-bg text-white font-body min-h-screen">

    <header id="header" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
        <div class="max-w-[1440px] mx-auto px-4 sm:px-6 py-3.5 flex items-center justify-between gap-4">
            <a href="#" onclick="goHome();return false" class="flex items-center gap-2 flex-shrink-0" aria-label="xStream Home">
                <div class="w-9 h-9 rounded-lg bg-accent flex items-center justify-center"><i class="fas fa-play text-white text-sm ml-0.5"></i></div>
                <span class="font-display text-2xl sm:text-3xl tracking-wider text-white">xStream</span>
            </a>
            <div class="relative flex-1 max-w-xl mx-4 search-desktop">
                <input type="text" id="search-input" placeholder="Search movies, actors, directors..." class="w-full bg-surface/80 backdrop-blur-md border border-border rounded-full px-5 py-2.5 pl-11 text-sm text-white placeholder-muted focus:outline-none focus:border-accent/60 transition-colors" aria-label="Search movies">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-muted text-sm"></i>
                <button id="search-clear" class="absolute right-4 top-1/2 -translate-y-1/2 text-muted hover:text-white transition-colors hidden" aria-label="Clear search"><i class="fas fa-times text-sm"></i></button>
            </div>
            <div class="flex items-center gap-3">
                <button id="search-mobile-btn" class="search-mobile w-10 h-10 rounded-full bg-surface/80 border border-border flex items-center justify-center hover:border-accent/50 transition-colors" aria-label="Search"><i class="fas fa-search text-muted text-sm"></i></button>
                <div id="proxy-indicator" class="hidden proxy-badge"><i class="fas fa-shield-halved mr-1"></i><span id="proxy-label">proxy</span></div>
            </div>
        </div>
        <div id="mobile-search" class="hidden px-4 pb-3 search-mobile">
            <div class="relative">
                <input type="text" id="search-input-mobile" placeholder="Search movies..." class="w-full bg-surface/80 backdrop-blur-md border border-border rounded-full px-5 py-2.5 pl-11 text-sm text-white placeholder-muted focus:outline-none focus:border-accent/60 transition-colors" aria-label="Search movies mobile">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-muted text-sm"></i>
            </div>
        </div>
    </header>

    <main id="main-content">
        <section id="hero" class="relative min-h-[85vh] overflow-hidden">
            <div id="hero-backdrop" class="absolute inset-0 bg-cover bg-center transition-all duration-700"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-bg via-bg/50 to-bg/30"></div>
            <div class="absolute inset-0 bg-gradient-to-r from-bg/90 via-bg/30 to-transparent"></div>
            <div class="absolute inset-0 pointer-events-none overflow-hidden">
                <div class="absolute top-1/3 left-[15%] w-72 h-72 bg-accent/8 rounded-full blur-[120px] float-orb"></div>
                <div class="absolute bottom-1/4 right-[20%] w-56 h-56 bg-teal/6 rounded-full blur-[100px] float-orb-slow"></div>
            </div>
            <div class="relative z-10 min-h-[85vh] flex items-end pb-16 sm:pb-20 px-4 sm:px-6 max-w-[1440px] mx-auto">
                <div id="hero-content" class="max-w-2xl w-full"></div>
            </div>
        </section>
        <div id="rows-container" class="relative z-10 -mt-8 space-y-12 pb-16 px-4 sm:px-6 max-w-[1440px] mx-auto"></div>
        <div id="search-results" class="hidden relative z-10 px-4 sm:px-6 max-w-[1440px] mx-auto pb-16 pt-4"></div>
    </main>

    <div id="detail-modal" class="fixed inset-0 z-[100] hidden" role="dialog" aria-modal="true" aria-label="Movie details">
        <div class="absolute inset-0 bg-black/85 backdrop-blur-md" id="detail-backdrop"></div>
        <div class="relative z-10 h-full overflow-y-auto scrollbar-hide">
            <div id="detail-content" class="max-w-5xl mx-auto pt-6 sm:pt-10 pb-20 px-4 sm:px-6"></div>
        </div>
    </div>

    <div id="toast-container" class="fixed top-20 right-4 z-[200] space-y-3 pointer-events-none"></div>

    <footer class="relative z-10 border-t border-border/50 mt-8">
        <div class="max-w-[1440px] mx-auto px-4 sm:px-6 py-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-md bg-accent/80 flex items-center justify-center"><i class="fas fa-play text-white text-[10px] ml-0.5"></i></div>
                <span class="font-display text-xl tracking-wider text-white/70">xStream</span>
            </div>
            <p class="text-xs text-muted/50">Powered by Kinocheck + WatchMode APIs. Built for cinema lovers.</p>
        </div>
    </footer>

<script>
(function(){
'use strict';

/* ===== API Keys — obfuscated ===== */
var _k1=[49,66,107,116,76,104,48,99,66,87,69,50,71,109,102,79,78,57,72,103,121,112,90,115,102,73,75,73,76,113,78,84,119,99,81,89,105,110,107,118,54,115,101,81,67,82,82,52,53,70,103,49,79,116,56,112,67,106,97,86,108,56,117,98];
var KINO_KEY=_k1.map(function(c){return String.fromCharCode(c)}).join('');
var _k2=[119,109,95,118,105,48,115,118,45,73,110,80,55,76,86,115,68,111,83,49,50,85,70,69,83,88,109,121,113,114,48,80,102,83,104,107,84,67,70,66,49,110,50,89,51,115];
var WM_KEY=_k2.map(function(c){return String.fromCharCode(c)}).join('');

var KINO_URL='https://api.kinocheck.com';
var WM_URL='https://api.watchmode.com/v1';

var PROXIES=[
    {name:'direct',prefix:''},
    {name:'corsproxy',prefix:'https://corsproxy.io/?'},
    {name:'allorigins',prefix:'https://api.allorigins.win/raw?url='}
];

/* ===== State ===== */
var state={
    movies:[],featuredMovie:null,searchResults:[],
    selectedMovie:null,movieDetail:null,movieVideos:[],
    movieCasts:[],watchSources:[],isLoading:false,
    isDetailLoading:false,detailOpen:false,searchQuery:'',
    activeVideoKey:null,activeProxy:null
};

/* ===== DOM ===== */
var $=function(s){return document.querySelector(s)};
var $$=function(s){return document.querySelectorAll(s)};
var DOM={
    header:$('#header'),hero:$('#hero'),heroBackdrop:$('#hero-backdrop'),
    heroContent:$('#hero-content'),rowsContainer:$('#rows-container'),
    searchResults:$('#search-results'),detailModal:$('#detail-modal'),
    detailBackdrop:$('#detail-backdrop'),detailContent:$('#detail-content'),
    searchInput:$('#search-input'),searchInputMobile:$('#search-input-mobile'),
    searchClear:$('#search-clear'),toastContainer:$('#toast-container'),
    proxyIndicator:$('#proxy-indicator'),proxyLabel:$('#proxy-label')
};

/* ===== Shared CORS fetch ===== */
function isCorsError(err){
    if(!err)return false;
    var msg=(err.message||'').toLowerCase();
    if(msg==='failed to fetch'||msg==='load failed'||msg.indexOf('networkerror')!==-1||msg.indexOf('cross-origin')!==-1||msg.indexOf('cors')!==-1||msg.indexOf('blocked')!==-1)return true;
    if(err instanceof TypeError&&(!err.message||err.message===''))return true;
    return false;
}
function getErrorMsg(err){
    if(!err)return'Unknown error';
    if(err.message&&err.message.length>0&&err.message!=='undefined')return err.message;
    if(err instanceof TypeError)return'Network/CORS error — request was blocked';
    if(typeof err==='string')return err;
    try{return JSON.stringify(err)}catch(e){return'Unknown error'}
}

function corsGet(baseUrl,apiKey,path,headers){
    if(state.activeProxy!==null){
        return doFetch(baseUrl,apiKey,path,headers,state.activeProxy);
    }
    var lastErr=null;
    var chain=Promise.reject(new Error('start'));
    for(var i=0;i<PROXIES.length;i++){
        (function(idx){
            chain=chain.catch(function(err){
                lastErr=err;
                console.warn('[xStream] Proxy "'+PROXIES[idx].name+'" failed:',err.message||err);
                if(isCorsError(err)&&idx<PROXIES.length-1){
                    return doFetch(baseUrl,apiKey,path,headers,idx);
                }
                throw err;
            });
        })(i);
    }
    return chain.then(function(){
        return doFetch(baseUrl,apiKey,path,headers,0).then(function(data){
            console.log('[xStream] Direct connection succeeded.');
            return data;
        });
    });
}

function doFetch(baseUrl,apiKey,path,extraHeaders,proxyIdx){
    var proxy=PROXIES[proxyIdx];
    var targetUrl=baseUrl+path+(path.indexOf('?')!==-1?'&':'?')+'apiKey='+encodeURIComponent(apiKey);
    var fetchUrl=proxy.prefix?proxy.prefix+encodeURIComponent(targetUrl):targetUrl;
    var hdrs={};
    if(extraHeaders)for(var k in extraHeaders)hdrs[k]=extraHeaders[k];
    return fetch(fetchUrl,{method:'GET',headers:hdrs}).then(function(res){
        if(!res.ok)return res.text().then(function(t){throw new Error('API '+res.status+': '+(t||res.statusText))});
        return res.text().then(function(text){try{return JSON.parse(text)}catch(e){throw new Error('Invalid JSON response')}});
    });
}

function kinoGet(path){return corsGet(KINO_URL,KINO_KEY,path,{'Content-Type':'application/json','Accept':'application/json','X-Api-Host':'api.kinocheck.com'})}
function wmGet(path){return corsGet(WM_URL,WM_KEY,path.replace('?','?'),'')}

function showProxyBadge(name){DOM.proxyIndicator.classList.remove('hidden');DOM.proxyLabel.textContent=name}

/* ===== Kinocheck API ===== */
function fetchMovies(){
    state.isLoading=true;renderSkeletons();
    kinoGet('/movies').then(function(data){
        var movies=normalizeMovies(data);
        if(!movies.length)showToast('API returned 0 movies.','warning');
        state.movies=movies;state.featuredMovie=movies[0]||null;
        renderHero();renderMovieRows();
        if(movies.length>0)showToast('Loaded '+movies.length+' movies.','success');
    }).catch(function(err){
        console.error('[xStream] Fetch error:',err);
        showToast('Failed: '+getErrorMsg(err),'error');
        renderErrorHero(err);DOM.rowsContainer.innerHTML='';
    }).then(function(){state.isLoading=false});
}

function fetchKinocheckDetail(id){
    var eps=['/movie?id='+id,'/movie/'+id,'/movie?tmdb_id='+id];
    var chain=Promise.reject(new Error('start'));
    for(var i=0;i<eps.length;i++){(function(ep){chain=chain.catch(function(){return kinoGet(ep)})})(eps[i])}
    return chain;
}

function fetchKinocheckTrailer(tmdbId){
    var eps=['/movie?tmdb_id='+tmdbId,'/movie/'+ +tmdbId];
    var chain=Promise.reject(new Error('start'));
    for(var i=0;i<eps.length;i++){(function(ep){chain=chain.catch(function(){return kinoGet(ep).then(function(d){var v=normalizeVideos(d);if(v.length)state.movieVideos=v})})})(eps[i])}
    return chain.catch(function(){});
}

/* ===== WatchMode API ===== */
function findAndFetchWM(tmdbId,imdbId,title,year){
    var field,val;
    if(tmdbId){field='tmdb_id';val=tmdbId}
    else if(imdbId){field='imdb_id';val=imdbId}
    else if(title){field='name';val=title+(year?' '+year:'')}
    else return Promise.resolve();
    return wmGet('/search/?search_field='+field+'&search_value='+encodeURIComponent(val)+'&types=movie').then(function(data){
        var results=data.title_results||[];
        if(!results.length)return;
        var wmId=results[0].id;
        state.movieDetail.wmId=wmId;
        if(!state.movieDetail.tmdbId&&results[0].tmdb_id)state.movieDetail.tmdbId=String(results[0].tmdb_id);
        if(!state.movieDetail.imdbId&&results[0].imdb_id)state.movieDetail.imdbId=results[0].imdb_id;
        return wmGet('/title/'+wmId+'/details/?append_to_response=sources,cast-crew').then(function(detail){
            state.watchSources=normalizeSources(detail.sources||[]);
            if(!state.movieCasts.length)state.movieCasts=normalizeWMCast(detail.cast_crew||[]);
            if(!state.movieDetail.overview&&detail.plot_overview)state.movieDetail.overview=detail.plot_overview;
            if(!state.movieDetail.runtime&&detail.runtime_minutes)state.movieDetail.runtime=detail.runtime_minutes;
            if(!state.movieDetail.genres.length&&detail.genre_names)state.movieDetail.genres=detail.genre_names;
        });
    }).catch(function(){});
}

function fetchWMDetail(wmId){
    return wmGet('/title/'+wmId+'/details/?append_to_response=sources,cast-crew').then(function(data){
        state.movieDetail=normalizeWMDetail(data);
        state.watchSources=normalizeSources(data.sources||[]);
        state.movieCasts=normalizeWMCast(data.cast_crew||[]);
        if(data.tmdb_id)return fetchKinocheckTrailer(String(data.tmdb_id));
    }).catch(function(err){console.warn('[xStream] WM detail failed:',err)});
}

/* ===== Combined search ===== */
function combinedSearch(query){
    return Promise.allSettled([
        kinoGet('/search?query='+encodeURIComponent(query)),
        wmGet('/search/?search_field=name&search_value='+encodeURIComponent(query)+'&types=movie')
    ]).then(function(results){
        var kino=results[0].status==='fulfilled'?normalizeMovies(results[0].value):[];
        var wm=results[1].status==='fulfilled'?normalizeWMSearch(results[1].value):[];
        return mergeResults(kino,wm);
    });
}

function mergeResults(kino,wm){
    var merged=kino.slice();var seen={};
    for(var i=0;i<kino.length;i++){seen[(kino[i].title+'|'+kino[i].year).toLowerCase()]=true}
    for(var j=0;j<wm.length;j++){
        var key=(wm[j].title+'|'+wm[j].year).toLowerCase();
        if(!seen[key]){merged.push(wm[j]);seen[key]=true}
    }
    return merged;
}

/* ===== Data normalizers ===== */
function resolveImg(p){
    if(!p)return null;
    if(typeof p==='object'&&p.url)p=p.url;
    if(typeof p!=='string')return null;
    if(p.indexOf('http')===0)return p;
    if(p.indexOf('/')===0)return'https://image.tmdb.org/t/p/w500'+p;
    return p;
}

function normalizeMovie(r){
    if(!r||typeof r!=='object')return null;
    var g=r.genres||r.genre||[];
    var genres=Array.isArray(g)?g.map(function(x){return typeof x==='string'?x:(x.name||x.title||'')}).filter(Boolean):(typeof g==='string'?[g]:[]);
    return{
        id:r.id||r.tmdb_id||r.kinocheck_id||'',
        wmId:r.wmId||'',tmdbId:r.tmdb_id||r.tmdbId||'',
        title:r.title||r.name||r.original_title||r.original_name||'Untitled',
        poster:resolveImg(r.poster_url||r.poster_path||r.poster),
        backdrop:resolveImg(r.backdrop_url||r.backdrop_path||r.backdrop||r.fanart),
        overview:r.overview||r.description||r.synopsis||'',
        releaseDate:r.release_date||r.year||r.first_air_date||'',
        rating:parseFloat(r.vote_average||r.rating||r.score||r.voteAverage||0)||0,
        genres:genres,year:(r.release_date||r.year||r.first_air_date||'').toString().substring(0,4),
        runtime:r.runtime||r.duration||0,tagline:r.tagline||'',
        originalTitle:r.original_title||r.original_name||'',
        imdbId:r.imdb_id||r.imdbId||''
    };
}

function normalizeMovies(resp){
    if(!resp)return[];
    if(Array.isArray(resp))return resp.map(normalizeMovie).filter(Boolean);
    var keys=['results','data','movies','items','hits'];
    for(var i=0;i<keys.length;i++){if(Array.isArray(resp[keys[i]]))return resp[keys[i]].map(normalizeMovie).filter(Boolean)}
    if(resp.id||resp.title)return[normalizeMovie(resp)].filter(Boolean);
    return[];
}

function normalizeWMSearch(resp){
    if(!resp)return[];
    var results=resp.title_results||[];
    return results.filter(function(r){return r.type==='movie'}).map(function(r){
        return{
            id:'',wmId:r.id||'',tmdbId:r.tmdb_id?String(r.tmdb_id):'',
            title:r.name||'Untitled',
            poster:resolveImg(r.poster_url),backdrop:resolveImg(r.backdrop_url),
            overview:r.plot_overview||'',year:(r.year||'').toString(),
            rating:parseFloat(r.user_rating||0)||0,
            genres:Array.isArray(r.genre_names)?r.genre_names:[],
            runtime:r.runtime_minutes||0,tagline:'',originalTitle:r.original_title||'',
            imdbId:r.imdb_id||'',releaseDate:r.year?r.year+'-01-01':''
        };
    }).filter(Boolean);
}

function normalizeWMDetail(data){
    if(!data)return null;
    return{
        id:'',wmId:data.id||'',tmdbId:data.tmdb_id?String(data.tmdb_id):'',
        title:data.title||'Untitled',
        poster:resolveImg(data.poster_url),backdrop:resolveImg(data.backdrop_url),
        overview:data.plot_overview||'',releaseDate:data.release_date||'',
        rating:parseFloat(data.user_rating||0)||0,
        genres:Array.isArray(data.genre_names)?data.genre_names:[],
        year:(data.year||'').toString(),runtime:data.runtime_minutes||0,
        tagline:'',originalTitle:data.original_title||'',imdbId:data.imdb_id||''
    };
}

function normalizeVideos(d){
    if(!d)return[];
    var sources=[d.videos,d.trailers,d.video,d.youtube_trailers,d.trailer];
    for(var i=0;i<sources.length;i++){
        var src=sources[i];
        if(Array.isArray(src)&&src.length>0)return src.map(function(v){return{key:v.key||v.youtube_key||v.youtube_id||v.video_key||'',name:v.name||v.title||'Trailer',type:v.type||v.category||'Trailer'}}).filter(function(v){return v.key});
        if(src&&typeof src==='object'&&(src.key||src.youtube_key||src.youtube_id||src.video_key)){
            var item={key:src.key||src.youtube_key||src.youtube_id||src.video_key||'',name:src.name||src.title||'Trailer',type:src.type||src.category||'Trailer'};
            return item.key?[item]:[];
        }
    }return[];
}

function normalizeCasts(d){
    if(!d)return[];
    var sources=[d.casts,d.cast,d.actors,d.people];
    for(var i=0;i<sources.length;i++){
        var src=sources[i];
        if(Array.isArray(src))return src.map(function(c){return{id:c.id||'',name:c.name||'Unknown',character:c.character||c.role||c.part||'',photo:resolveImg(c.profile_path||c.profile_url||c.photo||c.image||c.profile)}}).filter(function(c){return c.name!=='Unknown'||c.character});
    }return[];
}

function normalizeWMCast(castCrew){
    if(!Array.isArray(castCrew))return[];
    return castCrew.filter(function(c){return c.type==='cast'}).map(function(c){return{id:c.person_id||'',name:c.name||'Unknown',character:c.character_name||'',photo:resolveImg(c.profile_url)}}).filter(function(c){return c.name!=='Unknown'});
}

function normalizeSources(sources){
    if(!Array.isArray(sources))return[];
    return sources.map(function(s){return{sourceId:s.source_id,name:s.name||'Unknown',type:s.type||'sub',region:s.region||'US',format:s.formats||'',price:s.price||0,currency:s.currency||'USD',url:s.url||''}}).filter(function(s){return s.name!=='Unknown'});
}

    }else if(id){
        mainPromise=fetchKinocheckDetail(id).then(function(data){
            if(data){state.movieDetail=normalizeMovie(data);state.movieVideos=normalizeVideos(data);state.movieCasts=normalizeCasts(data)}
            var tmdbId=data?(data.tmdb_id||''):'';
            var imdbId=data?(data.imdb_id||data.imdbId||''):'';
            var title=state.movieDetail?state.movieDetail.title:'';
            var year=state.movieDetail?state.movieDetail.year:'';
            return findAndFetchWM(tmdbId,imdbId,title,year).catch(function(){});
        }).catch(function(err){console.warn('[xStream] Kinocheck detail failed:',err)});
    }else{
        closeDetail();return;
    }

    mainPromise.then(function(){
        if(state.movieDetail)renderDetailModal();
        else{showToast('Could not load movie details.','error');closeDetail()}
    }).catch(function(err){
        console.error('[xStream] Detail error:',err);
        if(state.movieDetail)renderDetailModal();
        else{showToast('Failed: '+getErrorMsg(err),'error');closeDetail()}
    }).then(function(){state.isDetailLoading=false});
}

function closeDetail(){
    state.detailOpen=false;state.selectedMovie=null;
    state.movieDetail=null;state.movieVideos=[];state.movieCasts=[];
    state.watchSources=[];state.activeVideoKey=null;
    DOM.detailModal.classList.add('hidden');
    document.body.style.overflow='';DOM.detailContent.innerHTML='';
}

function switchVideo(key,btn){
    state.activeVideoKey=key;
    var tabs=$$('.video-tab');
    for(var i=0;i<tabs.length;i++){tabs[i].classList.remove('active','bg-accent/10','text-accent');tabs[i].classList.add('text-muted','bg-card')}
    if(btn){btn.classList.add('active','bg-accent/10','text-accent');btn.classList.remove('text-muted','bg-card')}
    var iframe=DOM.detailContent.querySelector('iframe');
    if(iframe)iframe.src='https://www.youtube.com/embed/'+key+'?autoplay=1&rel=0&modestbranding=1';
}

function goHome(){clearSearch();window.scrollTo({top:0,behavior:'smooth'})}

window.openDetail=openDetail;window.closeDetail=closeDetail;
window.switchVideo=switchVideo;window.goHome=goHome;window.retryFetch=retryFetch;

/* ===== Toast ===== */
function showToast(msg,type){
    type=type||'info';
    var colors={success:'border-teal bg-teal/10 text-teal',error:'border-accent bg-accent/10 text-accent',warning:'border-gold bg-gold/10 text-gold',info:'border-white/20 bg-white/5 text-white/80'};
    var icons={success:'fa-check-circle',error:'fa-exclamation-circle',warning:'fa-exclamation-triangle',info:'fa-info-circle'};
    var el=document.createElement('div');
    el.className='pointer-events-auto flex items-center gap-3 px-5 py-3.5 rounded-xl border backdrop-blur-md shadow-xl toast-in '+(colors[type]||colors.info);
    el.innerHTML='<i class="fas '+(icons[type]||icons.info)+' text-sm"></i><span class="text-sm font-medium">'+escapeHtml(msg)+'</span>';
    DOM.toastContainer.appendChild(el);
    setTimeout(function(){el.classList.remove('toast-in');el.classList.add('toast-out');setTimeout(function(){el.remove()},300)},4000);
}

/* ===== Utils ===== */
function escapeHtml(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function debounce(fn,dl){var t;return function(){var a=arguments,c=this;clearTimeout(t);t=setTimeout(function(){fn.apply(c,a)},dl)}}
function observeRows(){
    var obs=new IntersectionObserver(function(entries){for(var i=0;i<entries.length;i++){if(entries[i].isIntersecting){entries[i].target.style.opacity='1';entries[i].target.style.transform='translateY(0)';obs.unobserve(entries[i].target)}}},{threshold:0.1});
    var secs=$$('.row-section');for(var i=0;i<secs.length;i++){secs[i].style.opacity='0';secs[i].style.transform='translateY(30px)';secs[i].style.transition='opacity .6s ease-out,transform .6s ease-out';obs.observe(secs[i])}
}

/* ===== Events ===== */
function bindEvents(){
    var ds=debounce(function(v){searchMovies(v)},400);
    DOM.searchInput.addEventListener('input',function(e){var v=e.target.value;DOM.searchClear.classList.toggle('hidden',!v);DOM.searchInputMobile.value=v;ds(v)});
    DOM.searchClear.addEventListener('click',clearSearch);
    DOM.searchInputMobile.addEventListener('input',function(e){var v=e.target.value;DOM.searchInput.value=v;DOM.searchClear.classList.toggle('hidden',!v);ds(v)});
    $('#search-mobile-btn').addEventListener('click',function(){var ms=$('#mobile-search');ms.classList.toggle('hidden');if(!ms.classList.contains('hidden'))DOM.searchInputMobile.focus()});
    DOM.detailBackdrop.addEventListener('click',closeDetail);
    window.addEventListener('scroll',function(){DOM.header.classList.toggle('header-scrolled',window.scrollY>50)},{passive:true});
    document.addEventListener('keydown',function(e){if(e.key==='Escape'&&state.detailOpen)closeDetail()});
    document.addEventListener('keydown',function(e){if(e.key==='Enter'&&e.target.classList.contains('movie-card'))e.target.click()});
}

function searchMovies(query){
    if(!query.trim()){clearSearch();return}
    state.searchQuery=query;
    DOM.searchResults.classList.remove('hidden');DOM.rowsContainer.classList.add('hidden');DOM.hero.classList.add('hidden');
    DOM.searchResults.innerHTML='<div class="flex items-center gap-3 mb-6"><h2 class="font-display text-2xl tracking-wider">Results for "'+escapeHtml(query)+'"</h2><div class="w-5 h-5 border-2 border-accent border-t-transparent rounded-full spin"></div></div><div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">'+Array(12).fill('<div class="aspect-[2/3] rounded-xl skeleton"></div>').join('')+'</div>';
    combinedSearch(query).then(function(movies){state.searchResults=movies;renderSearchResults(query)}).catch(function(err){
        DOM.searchResults.innerHTML='<div class="text-center py-20"><i class="fas fa-search text-4xl text-muted/30 mb-4"></i><p class="text-muted">Search failed: '+escapeHtml(getErrorMsg(err))+'</p></div>';
    });
}

/* ===== Init ===== */
function init(){bindEvents();renderEmptyHero();fetchMovies()}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
</body>
</html>
